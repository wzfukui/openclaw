        run: echo "OPENCLAW_VITEST_MAX_WORKERS=4" >> "$GITHUB_ENV"

      - name: Restore dist cache
        id: dist-cache
        if: matrix.requires_dist == true
        uses: actions/cache@v5
        with:
          path: dist/
          key: ${{ runner.os }}-dist-build-${{ github.sha }}

